<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duurzaamheid Quiz</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.4/html5-qrcode.min.js"></script>
</head>
<body>
    <div class="container">
        <!-- Quiz Screen -->
        <div id="quizScreen" class="quiz-screen">
            <div class="question-counter">
                Vraag <span id="currentQuestion">1</span> van <span id="totalQuestions">5</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <h1 id="questionText"></h1>
            <div id="errorMessage" class="error-message hidden"></div>
            <div class="options" id="optionsContainer"></div>
            <button class="submit-btn" id="submitBtn" onclick="checkAnswer()">Volgende</button>
        </div>

        <!-- Success Screen -->
        <div id="successScreen" class="success-screen hidden">
            <div class="success-icon">🌱</div>
            <div class="success-text">Prima!</div>
            <div class="success-subtext">Scan de QR code van de poster met je camera.</div>
            <div id="reader" class="qr-reader-container"></div>
            <div class="scanner-status">Camera wordt geladen...</div>
        </div>

        <!-- Completion Screen -->
        <div id="completionScreen" class="success-screen hidden">
            <div class="success-icon">🌍</div>
            <div class="success-text">Fantastisch!</div>
            <div class="success-subtext">Je bent duurzaamheidsbewust! Samen kunnen we de wereld verbeteren.</div>
            <button class="submit-btn finish-btn" onclick="location.reload()">Opnieuw starten</button>
        </div>
    </div>

    <script>
        // Quiz data - direct in HTML voor betrouwbaarheid
        const quizData = [
            {
                "question": "Welke energiebron is het meest duurzaam?",
                "options": ["Aardolie", "Zonnepanelen", "Steenkool", "Aardgas"],
                "correct": 1
            },
            {
                "question": "Hoeveel procent van het plastic gegeten wordt daadwerkelijk gerecycled?",
                "options": ["5%", "35%", "65%", "85%"],
                "correct": 0
            },
            {
                "question": "Wat is het meest milieubelastende product?",
                "options": ["Papieren zak", "Plastic zak", "Katoenen zak", "Polyester zak"],
                "correct": 1
            },
            {
                "question": "Hoeveel water kost het om 1 kg katoen te produceren?",
                "options": ["500 liter", "5.000 liter", "10.000 liter", "50.000 liter"],
                "correct": 2
            },
            {
                "question": "Welke voedselkeuze heeft de kleinste koolstofvoetafdruk?",
                "options": ["Rundvlees", "Kipvlees", "Groenten", "Kaas"],
                "correct": 2
            }
        ];

        let currentQuestionIndex = 0;
        let selectedAnswer = null;
        let singleQuestionMode = false;

        // Initialize quiz
        function init() {
            console.log('Quiz data geladen:', quizData.length, 'vragen');
            
            // Request camera permission at startup
            requestCameraPermission();
            
            // Check URL parameter for single question
            const params = new URLSearchParams(window.location.search);
            const questionParam = params.get('q');
            
            if (questionParam !== null) {
                const questionIndex = parseInt(questionParam) - 1; // Convert to 0-based index
                if (questionIndex >= 0 && questionIndex < quizData.length) {
                    currentQuestionIndex = questionIndex;
                    singleQuestionMode = true;
                }
            }
            
            loadQuestion();
        }
        
        // Request camera permission
        function requestCameraPermission() {
            // Don't request permission at startup, wait for scanner
            console.log('Camera permission will be requested when scanner starts');
        }

        // Load current question
        function loadQuestion() {
            const question = quizData[currentQuestionIndex];
            const totalQuestions = singleQuestionMode ? 1 : quizData.length;
            
            document.getElementById('currentQuestion').textContent = singleQuestionMode ? 1 : (currentQuestionIndex + 1);
            document.getElementById('totalQuestions').textContent = totalQuestions;
            document.getElementById('questionText').textContent = question.question;
            document.getElementById('errorMessage').classList.add('hidden');
            
            // Update progress bar
            const progress = singleQuestionMode ? 100 : ((currentQuestionIndex + 1) / quizData.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
            
            // Load options
            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';
            
            question.options.forEach((option, index) => {
                const optionDiv = document.createElement('div');
                optionDiv.className = 'option';
                optionDiv.innerHTML = `
                    <label>
                        <input type="radio" name="answer" value="${index}" onchange="selectedAnswer = ${index}">
                        <span>${option}</span>
                    </label>
                `;
                optionsContainer.appendChild(optionDiv);
            });
            
            selectedAnswer = null;
        }

        // Check if answer is correct
        function checkAnswer() {
            if (selectedAnswer === null) {
                showError('Selecteer alstublieft een antwoord!');
                return;
            }

            const question = quizData[currentQuestionIndex];
            
            if (selectedAnswer === question.correct) {
                if (singleQuestionMode) {
                    // Direct to completion in single question mode
                    document.getElementById('quizScreen').classList.add('hidden');
                    document.getElementById('completionScreen').classList.remove('hidden');
                } else {
                    showSuccess();
                }
            } else {
                showError('Niet correct. Probeer nog een keer - je kan het!');
                selectedAnswer = null;
            }
        }

        // Show success screen
        function showSuccess() {
            document.getElementById('quizScreen').classList.add('hidden');
            document.getElementById('successScreen').classList.remove('hidden');
            startQRScanner();
        }
        
        // Start QR code scanner
        function startQRScanner() {
            const reader = document.getElementById("reader");
            const statusElement = document.querySelector('.scanner-status');
            
            reader.innerHTML = ''; // Clear previous scanner
            statusElement.textContent = 'Camera wordt geladen...';
            
            // Check if camera is available
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                statusElement.textContent = 'Camera wordt niet ondersteund op dit apparaat.';
                return;
            }
            
            // Create scanner with better configuration
            const html5QrcodeScanner = new Html5QrcodeScanner(
                "reader",
                { 
                    fps: 10, 
                    qrbox: { width: 250, height: 250 },
                    aspectRatio: 1.0,
                    showTorchButtonIfSupported: false,
                    showZoomSliderIfSupported: false,
                    defaultZoomValueIfSupported: 1
                },
                false
            );
            
            html5QrcodeScanner.render((decodedText, decodedResult) => {
                console.log('QR Code gedetecteerd:', decodedText);
                statusElement.textContent = 'QR code gedetecteerd!';
                statusElement.classList.add('success');
                
                // Stop scanner
                html5QrcodeScanner.clear().then(() => {
                    console.log('Scanner gestopt');
                }).catch(err => {
                    console.error('Fout bij stoppen scanner:', err);
                });
                
                // Extract question number from QR code URL
                try {
                    const url = new URL(decodedText, window.location.origin);
                    const questionParam = url.searchParams.get('q');
                    
                    if (questionParam) {
                        // Navigate to the scanned question
                        const questionIndex = parseInt(questionParam) - 1;
                        if (questionIndex >= 0 && questionIndex < quizData.length) {
                            currentQuestionIndex = questionIndex;
                            document.getElementById('successScreen').classList.add('hidden');
                            document.getElementById('quizScreen').classList.remove('hidden');
                            selectedAnswer = null;
                            loadQuestion();
                        } else {
                            statusElement.textContent = 'Ongeldig vraagnummer in QR code.';
                            statusElement.classList.remove('success');
                        }
                    } else {
                        statusElement.textContent = 'QR code bevat geen geldige vraag link.';
                        statusElement.classList.remove('success');
                    }
                } catch (error) {
                    console.error('Fout bij QR code parsing:', error);
                    statusElement.textContent = 'QR code kon niet worden gelezen.';
                    statusElement.classList.remove('success');
                }
            }, (error) => {
                // Ignore scan errors, only log them
                console.log('Scan error (normaal):', error);
            });
            
            // Update status when scanner is ready
            setTimeout(() => {
                if (statusElement.textContent === 'Camera wordt geladen...') {
                    statusElement.textContent = 'Scan een QR code';
                }
            }, 2000);
            
            // Store scanner reference for cleanup
            window.currentScanner = html5QrcodeScanner;
        }
        
        // Stop QR scanner when leaving success screen
        function stopQRScanner() {
            if (window.currentScanner) {
                window.currentScanner.clear().then(() => {
                    console.log('Scanner gestopt');
                }).catch(err => {
                    console.error('Fout bij stoppen scanner:', err);
                });
                window.currentScanner = null;
            }
        }
        
        // Show error message
        function showError(message) {
            const errorElement = document.getElementById('errorMessage');
            errorElement.textContent = message;
            errorElement.classList.remove('hidden');
            
            // Hide error after 5 seconds
            setTimeout(() => {
                errorElement.classList.add('hidden');
            }, 5000);
        }
        function nextQuestion() {
            // Stop scanner if running
            stopQRScanner();
            
            if (singleQuestionMode) {
                // In single question mode, go directly to completion
                document.getElementById('successScreen').classList.add('hidden');
                document.getElementById('completionScreen').classList.remove('hidden');
            } else {
                currentQuestionIndex++;
                
                if (currentQuestionIndex < quizData.length) {
                    document.getElementById('successScreen').classList.add('hidden');
                    document.getElementById('quizScreen').classList.remove('hidden');
                    selectedAnswer = null;
                    loadQuestion();
                } else {
                    // Quiz completed
                    document.getElementById('successScreen').classList.add('hidden');
                    document.getElementById('completionScreen').classList.remove('hidden');
                }
            }
        }

        // Start the quiz
        init();
    </script>
</body>
</html>
